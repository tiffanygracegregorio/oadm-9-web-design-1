<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY LOVE ONE'S</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 2rem;
  line-height: 1.6;
  background-color: hotpink;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  background: white;
  padding: 2rem;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1, h2 {
  color: #2c3e50;
  border-bottom: 2px solid #3498db;
  padding-bottom: 0.3rem;
  text-align: center;
}

.section {
  margin-bottom: 2rem;
}

.section-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #2c3e50;
}

/* 2x2 GRID STYLE */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 2 columns */
  gap: 15px; /* space between pictures */
}

.gallery-card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: transform 0.2s;
}

.gallery-card:hover {
  transform: scale(1.05); /* zoom effect pag hover */
}

.gallery-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}

.gallery-caption {
  padding: 10px;
  text-align: center;
  font-weight: 600;
  color: #2c3e50;
  background: #fff;
}

.profile-pic {
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
  margin: 1rem 0;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
</style>
</head>
<body>

<div id="page-about" class="page">
  <button class="back-btn" onclick="goTo('home')">Back</button>
<div class="container">
  <h1>PHOTO GALLERY WITH LOVE ONE'S</h1>
  
  <div class="section">
    <img src="me (2).jpg" class="profile-pic" alt="Profile">
  </div>

  <div class="section">
    <div class="section-title">📸 MY LOVE ONE'S</div>
    
    <div class="gallery-grid">
      <!-- ROW 1 -->
      <div class="gallery-card">
        <img src="family pic.jpg" alt="04/09/2025">
        <div class="gallery-caption">04/09/2025</div>
      </div>
      
      <div class="gallery-card">
        <img src="family picture.jpg" alt="12/01/2022">
        <div class="gallery-caption">12/01/2022</div>
      </div>
       <!-- ROW 2 -->
      <div class="gallery-card">
        <img src="graduation day3.jpg" alt="05/30/2024">
        <div class="gallery-caption">05/30/2024</div>
      </div>
      
      <div class="gallery-card">
        <img src="my fav person.jpg" alt="04/02/2026">
        <div class="gallery-caption">04/02/2026</div>
      </div>
       <!-- ROW 3 -->
      <div class="gallery-card">
        <img src="my 2nd fam.jpg" alt="12/16/2025">
        <div class="gallery-caption">12/16/2025</div>
      </div>
      
      <div class="gallery-card">
        <img src="MY OG.jpg" alt="10/24/2024">
        <div class="gallery-caption">10/24/2024</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
