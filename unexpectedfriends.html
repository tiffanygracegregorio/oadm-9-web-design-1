<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHOTO GALLERY WITH FRIENDS</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 2rem;
  line-height: 1.6;
  background-color: hotpink;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  background: white;
  padding: 2rem;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1, h2 {
  color: #2c3e50;
  border-bottom: 2px solid #3498db;
  padding-bottom: 0.3rem;
  text-align: center;
}

.section {
  margin-bottom: 2rem;
}

.section-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #2c3e50;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr); 
  gap: 15px; 
}

.gallery-card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: transform 0.2s;
}

.gallery-card:hover {
  transform: scale(1.05); 
}

.gallery-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}

.gallery-caption {
  padding: 10px;
  text-align: center;
  font-weight: 600;
  color: #2c3e50;
  background: #fff;
}

.profile-pic {
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
  margin: 1rem 0;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
</style>
</head>
<body>

<div id="page-about" class="page">
  <button class="back-btn" onclick="goTo('home')">Back</button>
<div class="container">
  <h1>PHOTO GALLERY WITH FRIENDS</h1>
  
  <div class="section">
    <img src="me 3.webp" class="profile-pic" alt="Profile">
  </div>

  <div class="section">
    <div class="section-title">📸 My Photo Gallery</div>
    
    <div class="gallery-grid">
      <!-- ROW 1 -->
      <div class="gallery-card">
        <img src="unexpected friends.jpg" alt="COF 1">
        <div class="gallery-caption">COF 1</div>
      </div>
      
      <div class="gallery-card">
        <img src="Circle of friends.jpg" alt="COF 2">
        <div class="gallery-caption">COF 2</div>
      </div>
      
      <div class="gallery-card">
        <img src="COF 2.jpg" alt="COF 3">
        <div class="gallery-caption">COF 3</div>
      </div>
      
      <div class="gallery-card">
        <img src="PE day 2.jpg" alt="COF 4">
        <div class="gallery-caption">COF 4</div>
      </div>

      <div class="gallery-card">
        <img src="OG FRIENDS.jpg" alt="COF 5">
        <div class="gallery-caption">COF 5</div>
      </div>

      <div class="gallery-card">
        <img src="COF 3.jpg" alt="COF 6">
        <div class="gallery-caption">COF 6</div>
      </div> 
    </div>
  </div>
</div>

</body>
</html>
